{% extends 'tienda/base.html' %}

{% block content %}

<h1>Formulario de Producto</h1>

{% if messages %}
    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    {{ formulario.as_p }}

    <button type="submit" class="btn btn-primary">
        Guardar
    </button>
</form>

<br>

<a href="{% url 'tienda:listar_productos' %}">
    ← Volver al listado
</a>

{% endblock %}
